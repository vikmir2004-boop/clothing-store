<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой магазин одежды</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>👕 Мой магазин одежды</h1>
        <nav>
            <a href="#">Главная</a>
            <a href="#">Мужчинам</a>
            <a href="#">Женщинам</a>
            <a href="#">Контакты</a>
        </nav>
    </header>
    
    <main>
        <h2>Новинки</h2>
        
        <div class="products">
            <div class="product-card">
                <h3>Футболка базовая</h3>
                <p class="price">1 990 ₽</p>
                <button onclick="alert('Футболка добавлена в корзину!')">В корзину</button>
            </div>
            <div class="product-card">
                <h3>Худи оверсайз</h3>
                <p class="price">3 490 ₽</p>
                <button onclick="alert('Худи добавлено в корзину!')">В корзину</button>
            </div>
            <div class="product-card">
                <h3>Джинсы прямые</h3>
                <p class="price">4 990 ₽</p>
                <button onclick="alert('Джинсы добавлены в корзину!')">В корзину</button>
            </div>
        </div>
    </main>
    
    <footer>
        <p>© 2026 Мой магазин одежды</p>
    </footer>
</body>
</html>
